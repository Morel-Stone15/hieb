<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Boutique - Hieb | Vous faciliter la vie</title>
    <style>
        :root {
            --orange: #FF7F00;
            --yellow-pale: #FFEE99;
            --dark: #222222;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffaf0;
            color: var(--dark);
            line-height: 1.6;
        }
        
        /* HEADER RESPONSIVE */
        header {
            background: linear-gradient(135deg, var(--orange), #FF9900);
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(255, 127, 0, 0.3);
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: white;
        }
        
        .slogan {
            font-size: 0.8rem;
            font-style: italic;
            opacity: 0.95;
        }
        
        nav {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 5px 8px;
        }
        
        nav a:hover {
            color: var(--yellow-pale);
            transform: translateY(-2px);
        }
        
        .cart-icon {
            font-size: 1.5rem;
            cursor: pointer;
            position: relative;
            margin-left: 5px;
        }
        
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--yellow-pale);
            color: var(--orange);
            font-size: 0.7rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SECTION PRINCIPALE */
        .section {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }
        
        h2 {
            text-align: center;
            font-size: 2rem;
            color: var(--orange);
            margin-bottom: 30px;
            position: relative;
        }
        
        h2::after {
            content: '';
            width: 60px;
            height: 4px;
            background: var(--yellow-pale);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        /* Filtre catégorie responsive */
        .filter-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        select {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid var(--orange);
            border-radius: 50px;
            background: white;
            color: var(--dark);
            cursor: pointer;
            width: 90%;
            max-width: 320px;
        }

        /* Grille de produits responsive */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 127, 0, 0.2);
        }
        
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 15px;
            text-align: center;
        }
        
        .product-info h4 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--dark);
            min-height: 50px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .price {
            color: var(--orange);
            font-size: 1.3rem;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .add-to-cart {
            background: var(--orange);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .add-to-cart:hover {
            background: #e67300;
            transform: scale(1.02);
        }

        /* Footer */
        footer {
            background: var(--dark);
            color: var(--yellow-pale);
            text-align: center;
            padding: 30px 20px 20px;
            margin-top: 50px;
        }
        
        footer p { font-size: 0.85rem; }

        /* Menu Burger pour mobile */
        .burger-menu {
            display: none;
            cursor: pointer;
            z-index: 1001;
        }
        
        .burger-icon {
            width: 28px;
            height: 22px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .burger-icon span {
            width: 100%;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 260px;
            height: 100vh;
            background: linear-gradient(135deg, var(--orange), #FF9900);
            z-index: 999;
            transition: right 0.3s ease;
            padding-top: 70px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
        }
        
        .mobile-menu.active { right: 0; }
        
        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }
        
        .menu-overlay.active { display: block; }

        /* RESPONSIVE TABLETTE ET MOBILE */
        @media (max-width: 768px) {
            .logo h1 { font-size: 1.5rem; }
            .slogan { font-size: 0.7rem; }
            nav { display: none; }
            .burger-menu { display: block; }
            .cart-icon { margin-right: 10px; }
            h2 { font-size: 1.8rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        }
        
        @media (max-width: 480px) {
            .logo h1 { font-size: 1.3rem; }
            .slogan { font-size: 0.65rem; }
            h2 { font-size: 1.5rem; }
            .products-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>HIEB</h1>
                <div class="slogan">vous faciliter la vie</div>
            </div>
            
            <nav>
                <a href="index.html">Accueil</a>
                <a href="shop.html">Boutique</a>
                <a href="panier.html">Panier</a>
                <a href="administration.html">Administration</a>
            </nav>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="cart-icon" onclick="window.location.href='panier.html'">
                    🛒
                    <span id="cart-count-header" class="cart-count">0</span>
                </div>
                
                <div class="burger-menu" id="burgerMenu">
                    <div class="burger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">🏠 Accueil</a>
        <a href="shop.html">🛍️ Boutique</a>
        <a href="panier.html">🛒 Panier</a>
        <a href="administration.html">🔧 Administration</a>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="section">
        <h2>Notre Boutique</h2>
        
        <div class="filter-container">
            <select id="category-filter">
                <option value="">📋 Tous les catalogues</option>
                <!-- Categories will be loaded here -->
            </select>
        </div>
        
        <div class="products-grid" id="products-container">
            <!-- Products will be loaded here -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hieb - Vous faciliter la vie • Tous droits réservés</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import * as db from './supabase.js';

        let products = [];
        let categories = [];

        const burgerMenu = document.getElementById('burgerMenu');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        const productsContainer = document.getElementById('products-container');
        const categoryFilter = document.getElementById('category-filter');

        function toggleMenu() {
            burgerMenu.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
        }
        
        function closeMenu() {
            burgerMenu.classList.remove('active');
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        burgerMenu.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', closeMenu);
        
        function formatFCFA(prix) {
            return new Intl.NumberFormat('fr-FR').format(Math.round(prix)) + ' FCFA';
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let count = 0;
            cart.forEach(item => count += item.quantity || 1);
            const countElement = document.getElementById('cart-count-header');
            if (countElement) countElement.textContent = count;
        }

        window.addToCart = function(id, name, price, sellerPhone) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity = (existing.quantity || 1) + 1;
            else cart.push({id, name, price, quantity: 1, sellerPhone});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            const notif = document.createElement('div');
            notif.style.cssText = `
                position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
                background:var(--orange); color:white; padding:12px 20px; border-radius:50px;
                box-shadow:0 5px 15px rgba(0,0,0,0.3); z-index:9999; font-weight:bold;
                font-size:0.9rem; white-space:nowrap;
            `;
            notif.textContent = "✓ " + name + " ajouté au panier";
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        };
        
        window.buyNow = function(id, name, price, sellerPhone) {
            window.addToCart(id, name, price, sellerPhone);
            window.location.href = 'panier.html';
        };

        function renderProducts(filter = '') {
            const filtered = filter ? products.filter(p => p.categorie === filter) : products;
            
            if (filtered.length === 0) {
                productsContainer.innerHTML = `<p style="text-align:center; grid-column:1/-1; padding:40px;">Aucun produit trouvé.</p>`;
                return;
            }

            productsContainer.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.nom}" loading="lazy">
                    <div class="product-info">
                        <h4>${p.nom}</h4>
                        <div class="price">${formatFCFA(p.prix)}</div>
                        <div style="display:flex; gap:5px;">
                            <button onclick="addToCart(${p.id}, '${p.nom.replace(/'/g, "\\'")}', ${p.prix}, '${p.vendeurPhone || '24176483527'}')" class="add-to-cart" style="flex:1;">
                                🛒 Panier
                            </button>
                            <button onclick="buyNow(${p.id}, '${p.nom.replace(/'/g, "\\'")}', ${p.prix}, '${p.vendeurPhone || '24176483527'}')" class="add-to-cart" style="flex:1; background:var(--dark);">
                                📱 Acheter
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function init() {
            // Load from DB
            products = await db.getAll('produits');
            categories = await db.getAll('categories');

            // Load categories in filter
            categoryFilter.innerHTML += categories.map(c => `<option value="${c.nom}">${c.nom}</option>`).join('');
            
            // Check for category in URL
            const urlParams = new URLSearchParams(window.location.search);
            const catParam = urlParams.get('categorie');
            if (catParam) {
                categoryFilter.value = catParam;
                renderProducts(catParam);
            } else {
                renderProducts();
            }

            categoryFilter.addEventListener('change', (e) => {
                renderProducts(e.target.value);
                // Update URL without reload
                const newUrl = window.location.pathname + (e.target.value ? '?categorie=' + encodeURIComponent(e.target.value) : '');
                window.history.pushState({path:newUrl},'',newUrl);
            });

            updateCartCount();
        }

        window.onload = init;
    </script>
</body>
</html>
