<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hieb - Vous faciliter la vie</title>
    <style>
        :root {
            --orange: #FF7F00;
            --yellow-pale: #FFEE99;
            --dark: #222222;
            --purple: #6B2D9E;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff;
            color: var(--dark);
        }

        /* ==================== HEADER ==================== */
        header {
            background: linear-gradient(135deg, var(--orange), #FF9900);
            color: white;
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(255, 127, 0, 0.3);
        }
        
        .header-container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }
        .slogan { font-size: 1.05rem; font-style: italic; opacity: 0.95; margin-top: 6px; }
        
        /* Navigation desktop */
        .nav-desktop {
            display: flex;
            align-items: center;
            gap: 35px;
        }
        
        .nav-desktop a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        
        .nav-desktop a:hover { color: var(--yellow-pale); transform: translateY(-2px); }
        
        /* Menu Burger */
        .burger-menu {
            display: none;
            cursor: pointer;
            z-index: 1001;
        }
        
        .burger-icon {
            width: 30px;
            height: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .burger-icon span {
            width: 100%;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        .burger-menu.active .burger-icon span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }
        
        .burger-menu.active .burger-icon span:nth-child(2) {
            opacity: 0;
        }
        
        .burger-menu.active .burger-icon span:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -8px);
        }
        
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 280px;
            height: 100vh;
            background: linear-gradient(135deg, var(--orange), #FF9900);
            z-index: 999;
            transition: right 0.4s ease;
            padding-top: 80px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.3);
        }
        
        .mobile-menu.active {
            right: 0;
        }
        
        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        
        .mobile-menu a:hover {
            background: rgba(255,255,255,0.2);
            padding-left: 40px;
        }
        
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 998;
            display: none;
        }
        
        .menu-overlay.active {
            display: block;
        }
        
        .cart-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .cart-icon { font-size: 1.65rem; position: relative; }
        
        .cart-count {
            position: absolute;
            top: -6px; right: -8px;
            background: var(--yellow-pale);
            color: var(--orange);
            font-size: 0.85rem;
            font-weight: bold;
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== HERO SLIDER ==================== */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 650px;
            overflow: hidden;
            color: white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .hero-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .hero-slide.active { opacity: 1; }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(255,127,0,0.5));
        }
        
        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 0 20px;
        }
        
        .hero h1 { font-size: 4.8rem; font-weight: 900; margin-bottom: 10px; text-shadow: 0 5px 20px rgba(0,0,0,0.7); }
        .hero p { font-size: 1.85rem; margin-bottom: 45px; text-shadow: 0 3px 12px rgba(0,0,0,0.6); }
        
        .btn {
            display: inline-block;
            padding: 18px 48px;
            background: var(--yellow-pale);
            color: var(--orange);
            font-size: 1.45rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 238, 153, 0.5);
            transition: all 0.4s;
        }
        .btn:hover { transform: scale(1.08) translateY(-5px); }

        /* ==================== SECTION CATÉGORIES ==================== */
        .section {
            max-width: 1300px;
            margin: 90px auto;
            padding: 0 25px;
        }
        
        h2 {
            text-align: center;
            font-size: 2.7rem;
            color: var(--orange);
            margin-bottom: 60px;
            position: relative;
        }
        h2::after {
            content: '';
            width: 100px;
            height: 5px;
            background: var(--yellow-pale);
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            justify-content: center;
        }
        
        .category-card {
            background: white;
            padding: 22px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            color: var(--purple);
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid #f0f0f0;
        }
        
        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(107, 45, 158, 0.15);
            border-color: var(--yellow-pale);
        }
        
        .category-card span {
            font-size: 2.2rem;
            width: 45px;
            text-align: center;
        }

        /* ==================== PRODUITS EN VEDETTE ==================== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.4s;
        }
        
        .product-card:hover { transform: translateY(-12px); }
        
        .product-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        
        .product-info {
            padding: 20px;
            text-align: center;
        }
        
        .product-info h4 {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .price {
            color: var(--orange);
            font-size: 1.65rem;
            font-weight: 700;
        }
        
        .add-to-cart {
            background: var(--orange);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .add-to-cart:hover { background: #e67300; }

        footer {
            background: var(--dark);
            color: var(--yellow-pale);
            padding: 60px 20px 40px;
            text-align: center;
            margin-top: 100px;
        }

        /* ==================== RESPONSIVE ==================== */
        @media (max-width: 768px) {
            .nav-desktop {
                display: none;
            }
            
            .burger-menu {
                display: block;
            }
            
            .cart-container {
                margin-right: 15px;
            }
            
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero p {
                font-size: 1.2rem;
            }
            
            .btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
            
            h2 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .logo h1 {
                font-size: 1.8rem;
            }
            
            .slogan {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>HIEB</h1>
                <div class="slogan">vous faciliter la vie</div>
            </div>
            
            <nav class="nav-desktop">
                <a href="index.html">Accueil</a>
                <a href="shop.html">Boutique</a>
                <a href="panier.html">Panier</a>
                <a href="administration.html">Administration</a>
            </nav>
            
            <div style="display: flex; align-items: center;">
                <div class="cart-container" onclick="window.location.href='panier.html'">
                    <div class="cart-icon">
                        🛒
                        <span id="cart-count-header" class="cart-count">0</span>
                    </div>
                </div>
                
                <div class="burger-menu" id="burgerMenu">
                    <div class="burger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">🏠 Accueil</a>
        <a href="shop.html">🛍️ Boutique</a>
        <a href="panier.html">🛒 Panier</a>
        <a href="administration.html">🔧 Administration</a>
    </div>
    
    <div class="menu-overlay" id="menuOverlay"></div>

    <section class="hero">
        <div class="hero-slide active" id="slide1" style="background-image: url('https://picsum.photos/1920/1080?random=10');"></div>
        <div class="hero-slide" id="slide2" style="background-image: url('https://picsum.photos/1920/1080?random=11');"></div>
        <div class="hero-slide" id="slide3" style="background-image: url('https://picsum.photos/1920/1080?random=12');"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1>HIEB</h1>
            <p>Vous faciliter la vie</p>
            <a href="shop.html" class="btn">Découvrir nos catalogues</a>
        </div>
    </section>

    <div class="section">
        <h2>Nos catalogues</h2>
        <div class="categories-grid" id="categories-container">
            <!-- Dynamically populated -->
        </div>
    </div>

    <div class="section">
        <h2>Produits en vedette</h2>
        <div id="featured-products" class="products-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 Hieb - Vous faciliter la vie • Tous droits réservés</p>
    </footer>

    <script type="module">
        import { products as defaultProducts, categories as defaultCategories } from './products.js';
        
        const products = JSON.parse(localStorage.getItem('local_products')) || defaultProducts;
        const categories = JSON.parse(localStorage.getItem('local_categories')) || defaultCategories;

        const burgerMenu = document.getElementById('burgerMenu');
        const mobileMenu = document.getElementById('mobileMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        
        function toggleMenu() {
            burgerMenu.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
        }
        
        function closeMenu() {
            burgerMenu.classList.remove('active');
            mobileMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        burgerMenu.addEventListener('click', toggleMenu);
        menuOverlay.addEventListener('click', closeMenu);
        
        document.querySelectorAll('.mobile-menu a').forEach(link => {
            link.addEventListener('click', closeMenu);
        });

        function formatFCFA(prix) {
            return new Intl.NumberFormat('fr-FR').format(Math.round(prix)) + ' FCFA';
        }

        let currentSlide = 1;
        const totalSlides = 3;
        function showSlide(n) {
            document.querySelectorAll('.hero-slide').forEach(slide => slide.classList.remove('active'));
            document.getElementById('slide' + n).classList.add('active');
        }
        function nextSlide() {
            currentSlide = (currentSlide % totalSlides) + 1;
            showSlide(currentSlide);
        }
        setInterval(nextSlide, 5000);

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let count = 0;
            cart.forEach(item => count += item.quantity || 1);
            const countElement = document.getElementById('cart-count-header');
            if (countElement) countElement.textContent = count;
        }

        window.addToCart = function(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity = (existing.quantity || 1) + 1;
            else cart.push({id, name, price, quantity: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('✅ ' + name + ' ajouté au panier !');
        };

        function loadCategories() {
            const container = document.getElementById('categories-container');
            if (container) {
                container.innerHTML = categories.map(cat => `
                    <a href="shop.html?categorie=${encodeURIComponent(cat.nom)}" class="category-card">
                        <span>${cat.icon}</span> ${cat.nom}
                    </a>
                `).join('');
            }
        }

        function loadFeatured() {
            const featured = products.slice(0, 3); // Just show first 3 as featured
            const container = document.getElementById('featured-products');
            if (container) {
                container.innerHTML = featured.map(p => `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.nom}">
                        <div class="product-info">
                            <h4>${p.nom}</h4>
                            <div class="price">${formatFCFA(p.prix)}</div>
                            <button onclick="addToCart(${p.id}, '${p.nom.replace(/'/g, "\\'")}', ${p.prix})" 
                                    class="add-to-cart">Ajouter au panier</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        window.onload = () => {
            updateCartCount();
            loadCategories();
            loadFeatured();
        };
    </script>
</body>
</html>
